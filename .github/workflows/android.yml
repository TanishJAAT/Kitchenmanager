name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Unzip project
      run: unzip KitchenStock.zip

    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Give permission
      run: chmod +x KitchenStock/gradlew

    - name: Build APK
      run: cd KitchenStock && ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: apk
        path: KitchenStock/app/build/outputs/apk/debug/app-debug.apk
