buildscript {
    ext {
        kotlin_version = '1.9.0'
        agp_version = '8.1.2'
        compose_bom_version = '2023.08.00'
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath "com.android.tools.build:gradle:$agp_version"
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}
